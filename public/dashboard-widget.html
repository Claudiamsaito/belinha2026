<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Saúde - Santa Casa Ilhabela</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            height: 50px;
        }

        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a202c;
        }

        .header-subtitle {
            font-size: 14px;
            color: #718096;
        }

        .last-update {
            font-size: 12px;
            color: #a0aec0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 12px;
            color: #a0aec0;
        }

        .card.primary {
            border-left: 4px solid #667eea;
        }

        .card.success {
            border-left: 4px solid #48bb78;
        }

        .card.warning {
            border-left: 4px solid #ed8936;
        }

        .card.danger {
            border-left: 4px solid #f56565;
        }

        .units-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .unit-item {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .unit-item:hover {
            background: #f7fafc;
        }

        .unit-name {
            font-weight: 600;
            color: #2d3748;
        }

        .unit-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rating-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .rating-stars {
            color: #fbbf24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-logo">
                <div>
                    <div class="header-title">📊 Dashboard de Saúde</div>
                    <div class="header-subtitle">Santa Casa Ilhabela</div>
                </div>
            </div>
            <div class="last-update">
                Última atualização: <span id="lastUpdate">--:--</span>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando dados...</p>
            </div>
        </div>

        <div class="footer">
            <p>Dados atualizados em tempo real | Sistema de Monitoramento de Satisfação - Santa Casa Ilhabela</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://8081-isg4ebcftlpszu4beltxd-e22779dd.us2.manus.computer/api';
        const REFRESH_INTERVAL = 30000; // 30 segundos

        async function carregarDados() {
            try {
                // Simular dados (em produção, seria uma chamada API real)
                const dados = await obterDadosDashboard();
                renderizarDashboard(dados);
                atualizarHorarioUltima();
            } catch (erro) {
                console.error('Erro ao carregar dados:', erro);
                mostrarErro('Erro ao carregar dados do dashboard');
            }
        }

        async function obterDadosDashboard() {
            // Simular dados para demonstração
            return {
                totalAvaliacoes: 156,
                mediaGeral: 4.7,
                unidadesAvaliadas: 8,
                unidades: [
                    { nome: 'Santa Casa — Sede / Administração', media: 5.0, avaliacoes: 45 },
                    { nome: 'Pronto Atendimento', media: 4.8, avaliacoes: 38 },
                    { nome: 'Internação', media: 4.6, avaliacoes: 32 },
                    { nome: 'UTI', media: 4.5, avaliacoes: 28 },
                    { nome: 'Farmácia', media: 4.9, avaliacoes: 13 },
                ]
            };
        }

        function renderizarDashboard(dados) {
            const html = `
                <div class="dashboard">
                    <div class="card primary">
                        <div class="card-title">Total de Avaliações</div>
                        <div class="card-value">${dados.totalAvaliacoes}</div>
                        <div class="card-subtitle">Últimos 30 dias</div>
                    </div>
                    <div class="card success">
                        <div class="card-title">Média Geral</div>
                        <div class="card-value">${dados.mediaGeral.toFixed(1)}</div>
                        <div class="card-subtitle">⭐ Avaliação média</div>
                    </div>
                    <div class="card warning">
                        <div class="card-title">Unidades Avaliadas</div>
                        <div class="card-value">${dados.unidadesAvaliadas}</div>
                        <div class="card-subtitle">Centros de saúde</div>
                    </div>
                </div>

                <div class="units-section">
                    <div class="section-title">📍 Avaliações por Unidade</div>
                    ${dados.unidades.map(u => `
                        <div class="unit-item">
                            <div class="unit-name">${u.nome}</div>
                            <div class="unit-rating">
                                <span class="rating-value">${u.media.toFixed(1)}</span>
                                <span class="rating-stars">${gerarEstrelas(u.media)}</span>
                                <span class="card-subtitle">${u.avaliacoes} avaliações</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function gerarEstrelas(media) {
            const estrelaCheia = '★';
            const estrelaVazia = '☆';
            const inteiro = Math.floor(media);
            const decimal = media - inteiro;
            let estrelas = estrelaCheia.repeat(inteiro);
            if (decimal >= 0.5) estrelas += '★';
            else if (decimal > 0) estrelas += '◐';
            estrelas += estrelaVazia.repeat(5 - Math.ceil(media));
            return estrelas;
        }

        function atualizarHorarioUltima() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('lastUpdate').textContent = `${horas}:${minutos}`;
        }

        function mostrarErro(mensagem) {
            document.getElementById('content').innerHTML = `<div class="error">${mensagem}</div>`;
        }

        // Carregar dados ao iniciar
        carregarDados();

        // Atualizar dados periodicamente
        setInterval(carregarDados, REFRESH_INTERVAL);

        // Atualizar horário a cada minuto
        setInterval(atualizarHorarioUltima, 60000);
    </script>
</body>
</html>
