<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Saúde com Gráficos - Santa Casa Ilhabela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 24px;
            font-weight: bold;
            color: #1a202c;
        }

        .header-subtitle {
            font-size: 14px;
            color: #718096;
        }

        .last-update {
            font-size: 12px;
            color: #a0aec0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 14px;
            color: #718096;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-value {
            font-size: 32px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 12px;
            color: #a0aec0;
        }

        .card.primary {
            border-left: 4px solid #667eea;
        }

        .card.success {
            border-left: 4px solid #48bb78;
        }

        .card.warning {
            border-left: 4px solid #ed8936;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            font-size: 16px;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 16px;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .units-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #1a202c;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .unit-item {
            padding: 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .unit-item:hover {
            background: #f7fafc;
        }

        .unit-name {
            font-weight: 600;
            color: #2d3748;
        }

        .unit-rating {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rating-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .rating-stars {
            color: #fbbf24;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .charts-section {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 24px;
            }

            .chart-wrapper {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <div class="header-title">📊 Dashboard de Saúde</div>
                <div class="header-subtitle">Santa Casa Ilhabela</div>
            </div>
            <div class="last-update">
                Última atualização: <span id="lastUpdate">--:--</span>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando dados...</p>
            </div>
        </div>

        <div class="footer">
            <p>Dados atualizados em tempo real | Sistema de Monitoramento de Satisfação - Santa Casa Ilhabela</p>
        </div>
    </div>

    <script>
        const API_URL = 'https://8081-isg4ebcftlpszu4beltxd-e22779dd.us2.manus.computer/api';
        const REFRESH_INTERVAL = 30000; // 30 segundos
        let lineChart = null;
        let barChart = null;

        async function carregarDados() {
            try {
                const dados = await obterDadosDashboard();
                renderizarDashboard(dados);
                atualizarHorarioUltima();
            } catch (erro) {
                console.error('Erro ao carregar dados:', erro);
                mostrarErro('Erro ao carregar dados do dashboard');
            }
        }

        async function obterDadosDashboard() {
            // Simular dados para demonstração
            const agora = new Date();
            const tendencias = [];
            
            // Gerar dados de tendências dos últimos 14 dias
            for (let i = 13; i >= 0; i--) {
                const data = new Date(agora);
                data.setDate(data.getDate() - i);
                tendencias.push({
                    data: data.toISOString().split('T')[0],
                    media: 4.3 + Math.random() * 0.7,
                    total: Math.floor(Math.random() * 15) + 5,
                });
            }

            return {
                totalAvaliacoes: 156,
                mediaGeral: 4.7,
                unidadesAvaliadas: 8,
                tendencias,
                unidades: [
                    { nome: 'Santa Casa — Sede / Administração', media: 5.0, avaliacoes: 45 },
                    { nome: 'Pronto Atendimento', media: 4.8, avaliacoes: 38 },
                    { nome: 'Internação', media: 4.6, avaliacoes: 32 },
                    { nome: 'UTI', media: 4.5, avaliacoes: 28 },
                    { nome: 'Farmácia', media: 4.9, avaliacoes: 13 },
                ]
            };
        }

        function renderizarDashboard(dados) {
            const html = `
                <div class="dashboard">
                    <div class="card primary">
                        <div class="card-title">Total de Avaliações</div>
                        <div class="card-value">${dados.totalAvaliacoes}</div>
                        <div class="card-subtitle">Últimos 30 dias</div>
                    </div>
                    <div class="card success">
                        <div class="card-title">Média Geral</div>
                        <div class="card-value">${dados.mediaGeral.toFixed(1)}</div>
                        <div class="card-subtitle">⭐ Avaliação média</div>
                    </div>
                    <div class="card warning">
                        <div class="card-title">Unidades Avaliadas</div>
                        <div class="card-value">${dados.unidadesAvaliadas}</div>
                        <div class="card-subtitle">Centros de saúde</div>
                    </div>
                </div>

                <div class="charts-section">
                    <div class="chart-container">
                        <div class="chart-title">📈 Tendência de Avaliações</div>
                        <div class="chart-wrapper">
                            <canvas id="lineChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-container">
                        <div class="chart-title">📊 Avaliações por Unidade</div>
                        <div class="chart-wrapper">
                            <canvas id="barChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="units-section">
                    <div class="section-title">📍 Avaliações por Unidade</div>
                    ${dados.unidades.map(u => \`
                        <div class="unit-item">
                            <div class="unit-name">\${u.nome}</div>
                            <div class="unit-rating">
                                <span class="rating-value">\${u.media.toFixed(1)}</span>
                                <span class="rating-stars">\${gerarEstrelas(u.media)}</span>
                                <span style="color: #a0aec0; font-size: 12px;">\${u.avaliacoes} avaliações</span>
                            </div>
                        </div>
                    \`).join('')}
                </div>
            `;

            document.getElementById('content').innerHTML = html;
            
            // Renderizar gráficos
            renderizarGraficos(dados);
        }

        function renderizarGraficos(dados) {
            // Gráfico de Linhas
            const ctxLine = document.getElementById('lineChart');
            if (ctxLine) {
                const labels = dados.tendencias.map(t => {
                    const date = new Date(t.data);
                    return `${date.getDate()}/${date.getMonth() + 1}`;
                });
                const valores = dados.tendencias.map(t => t.media);

                if (lineChart) lineChart.destroy();
                lineChart = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Média de Avaliações',
                            data: valores,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointRadius: 4,
                            pointBackgroundColor: '#667eea',
                            pointBorderColor: '#fff',
                            pointBorderWidth: 2,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                min: 0,
                                max: 5,
                                ticks: {
                                    color: '#718096',
                                },
                                grid: {
                                    color: 'rgba(226, 232, 240, 0.5)',
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#718096',
                                },
                                grid: {
                                    color: 'rgba(226, 232, 240, 0.5)',
                                }
                            }
                        }
                    }
                });
            }

            // Gráfico de Barras
            const ctxBar = document.getElementById('barChart');
            if (ctxBar) {
                const labels = dados.unidades.map(u => u.nome.substring(0, 15));
                const valores = dados.unidades.map(u => u.media);

                if (barChart) barChart.destroy();
                barChart = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Média de Avaliações',
                            data: valores,
                            backgroundColor: '#667eea',
                            borderColor: '#667eea',
                            borderWidth: 1,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                min: 0,
                                max: 5,
                                ticks: {
                                    color: '#718096',
                                },
                                grid: {
                                    color: 'rgba(226, 232, 240, 0.5)',
                                }
                            },
                            x: {
                                ticks: {
                                    color: '#718096',
                                },
                                grid: {
                                    display: false,
                                }
                            }
                        }
                    }
                });
            }
        }

        function gerarEstrelas(media) {
            const estrelaCheia = '★';
            const estrelaVazia = '☆';
            const inteiro = Math.floor(media);
            const decimal = media - inteiro;
            let estrelas = estrelaCheia.repeat(inteiro);
            if (decimal >= 0.5) estrelas += '★';
            else if (decimal > 0) estrelas += '◐';
            estrelas += estrelaVazia.repeat(5 - Math.ceil(media));
            return estrelas;
        }

        function atualizarHorarioUltima() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('lastUpdate').textContent = `${horas}:${minutos}`;
        }

        function mostrarErro(mensagem) {
            document.getElementById('content').innerHTML = `<div class="error">${mensagem}</div>`;
        }

        // Carregar dados ao iniciar
        carregarDados();

        // Atualizar dados periodicamente
        setInterval(carregarDados, REFRESH_INTERVAL);

        // Atualizar horário a cada minuto
        setInterval(atualizarHorarioUltima, 60000);
    </script>
</body>
</html>
